<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTL — Learn With Me: Arduino</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* إضافة تنسيقات مخصصة للـ Sketchfab لضمان التجاوب مع تصميم ESTL */
        .sketchfab-embed-wrapper {
            position: relative;
            width: 100%;
            height: 0;
            padding-bottom: 65%; /* للحفاظ على أبعاد الموديل */
            overflow: hidden;
            border: 1px solid var(--border-dim);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 4px;
            margin-top: 1.5rem;
        }

        .sketchfab-embed-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .model-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 0.75rem;
            padding: 0 0.5rem;
        }

        .model-info span {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }

        /* تحسين مظهر السكشن ليتناسب مع وجود الموديل */
        .visual-side {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body>

    <main>
        <section class="learn-section section" id="intro">
            <div class="container">
                <div class="slide-header fade-up">
                    <span class="slide-num">01</span>
                    <span class="section-tag" data-en="The Foundation" data-ar="الأساس">The Foundation</span>
                    <h2 data-en="The <span class='italic gold'>Microcontroller</span>" data-ar="المتحكم <span class='italic gold'>الدقيق</span>">The <span class="italic gold">Microcontroller</span></h2>
                    <div class="divider"></div>
                </div>

                <div class="two-col">
                    <div class="theory-side fade-up">
                        <p data-en="A microcontroller is essentially a tiny computer on a single chip. It contains a processor, memory, and programmable input/output peripherals." 
                           data-ar="المتحكم الدقيق هو في الأساس كمبيوتر صغير على شريحة واحدة. يحتوي على معالج وذاكرة وملحقات إدخال وإخراج قابلة للبرمجة.">
                           A microcontroller is essentially a tiny computer on a single chip...
                        </p>
                        
                        <ul class="points-list" style="margin-top: 2rem;">
                            <li data-en="Interactive Hardware Exploration" data-ar="استكشاف تفاعلي للعتاد">Interactive Hardware Exploration</li>
                            <li data-en="Real-time 3D Components" data-ar="مكونات ثلاثية الأبعاد حقيقية">Real-time 3D Components</li>
                        </ul>
                    </div>

                    <div class="visual-side fade-up">
                        <div class="sketchfab-embed-wrapper">
                            <iframe 
                                title="Arduino Uno" 
                                frameborder="0" 
                                allowfullscreen 
                                mozallowfullscreen="true" 
                                webkitallowfullscreen="true" 
                                allow="autoplay; fullscreen; xr-spatial-tracking" 
                                src="https://sketchfab.com/models/4abda46509214629a5e9d4ce2d5323af/embed?autostart=1&ui_theme=dark&ui_hint=0&dnt=1">
                            </iframe>
                        </div>
                        <div class="model-info">
                            <span data-en="Hardware: Arduino Uno" data-ar="العتاد: أردوينو أونو">Hardware: Arduino Uno</span>
                            <span data-en="Source: Sketchfab" data-ar="المصدر: سكتش فاب">Source: Sketchfab</span>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="lang.js"></script>
    <script>
        // كود تفعيل الـ Fade-up Animation بناءً على ستايل موقعك
        const observerOptions = { threshold: 0.1 };
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, observerOptions);

        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    </script>
</body>
</html>
