<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTL AI - ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <script type="importmap">
      {
        "imports": {
          "@google/generative-ai": "https://esm.run/@google/generative-ai"
        }
      }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; }
        .chat-container { height: calc(100vh - 160px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .message-content { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body class="text-slate-200">

    <header class="p-4 border-b border-slate-800 bg-slate-900 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-500">ESTL <span class="text-white">AI</span></h1>
            <div class="text-xs bg-slate-800 px-3 py-1 rounded-full border border-slate-700">Gemini 1.5 Flash Active</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 chat-container overflow-y-auto flex flex-col gap-4" id="chat-window">
        <div class="bg-slate-800 p-4 rounded-2xl rounded-tr-none max-w-[80%] self-start border border-slate-700">
            أهلاً بك في ESTL! أنا مدعوم بتقنيات Gemini، كيف يمكنني مساعدتك اليوم؟
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-slate-900 p-4 border-t border-slate-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." 
                class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-all text-white">
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-colors disabled:opacity-50">
                إرسال
            </button>
        </div>
    </footer>

    <script type="module">
        import { GoogleGenerativeAI } from "@google/generative-ai";

        // إعدادات الـ API
        const API_KEY = "ضع_مفتاحك_هنا"; // استبدل هذا بالمفتاح الخاص بك
        const genAI = new GoogleGenerativeAI(API_KEY);
        const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // دالة لإضافة الرسائل للواجهة
        function appendMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser 
                ? "bg-blue-600 p-4 rounded-2xl rounded-tl-none max-w-[80%] self-end text-white shadow-lg shadow-blue-900/20" 
                : "bg-slate-800 p-4 rounded-2xl rounded-tr-none max-w-[80%] self-start border border-slate-700";
            
            msgDiv.innerHTML = `<div class="message-content">${text}</div>`;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // دالة إظهار حالة "جاري الكتابة"
        function showLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading-indicator';
            loadingDiv.className = "text-slate-500 text-xs self-start italic px-2";
            loadingDiv.innerText = "ESTL يفكر...";
            chatWindow.appendChild(loadingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // منطق الإرسال الحقيقي
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            // 1. عرض رسالة المستخدم
            appendMessage(text, true);
            userInput.value = '';
            
            // 2. تعطيل الزر وإظهار حالة التحميل
            sendBtn.disabled = true;
            showLoading();

            try {
                // 3. الاتصال بـ Gemini
                const result = await model.generateContent(text);
                const response = await result.response;
                const botText = response.text();

                // 4. حذف مؤشر التحميل وعرض الرد
                document.getElementById('loading-indicator').remove();
                appendMessage(botText);
            } catch (error) {
                if (document.getElementById('loading-indicator')) document.getElementById('loading-indicator').remove();
                appendMessage("خطأ: تأكد من مفتاح الـ API الخاص بك أو اتصال الإنترنت.");
                console.error("Gemini Error:", error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
