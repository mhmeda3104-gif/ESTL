<!DOCTYPE html>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTL AI Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; }
        .chat-container { height: calc(100vh - 160px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-200">

    <header class="p-4 border-b border-slate-800 bg-slate-900 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-500">ESTL <span class="text-white">AI</span></h1>
            <div class="text-xs bg-slate-800 px-3 py-1 rounded-full border border-slate-700">Powered by Gemini API</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 chat-container overflow-y-auto flex flex-col gap-4" id="chat-window">
        <div class="bg-slate-800 p-4 rounded-2xl rounded-tr-none max-w-[80%] self-start border border-slate-700">
            أهلاً بك في ESTL! كيف يمكنني مساعدتك اليوم في مشروعك البرمجي أو في تنسيق ملابسك؟
        </div>
    </main>

    <footer class="fixed bottom-0 w-full bg-slate-900 p-4 border-t border-slate-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="اكتب سؤالك هنا..." 
                class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 transition-all text-white">
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-bold transition-colors">
                إرسال
            </button>
        </div>
    </footer>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // دالة لإضافة الرسائل للواجهة
        function appendMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser 
                ? "bg-blue-600 p-4 rounded-2xl rounded-tl-none max-w-[80%] self-end text-white shadow-lg" 
                : "bg-slate-800 p-4 rounded-2xl rounded-tr-none max-w-[80%] self-start border border-slate-700";
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // منطق الإرسال
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, true);
            userInput.value = '';

            // هنا تضع منطق الربط مع الـ API مستقبلاً
            // حالياً سنضع رد تلقائي كنموذج (Mock Response)
            setTimeout(() => {
                appendMessage("هذا نموذج لرد البوت. للربط الحقيقي تحتاج لاستخدام مفتاح API من Google AI Studio ووضعه في كود JavaScript.");
            }, 1000);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
