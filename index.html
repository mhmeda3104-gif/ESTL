<div class="pixel-bat"></div>

<style>
.pixel-bat {
  width: 1px;
  height: 1px;
  background: transparent;
  position: relative;
  /* الأنميشن يغير الظلال بسرعة */
  animation: fly 0.4s steps(1) infinite;
}

@keyframes fly {
  0% {
    /* الحالة الأولى: أجنحة متباعدة */
    box-shadow: 10px 10px black, 30px 10px black;
  }
  50% {
    /* الحالة الثانية: أجنحة متقاربة */
    box-shadow: 15px 15px black, 25px 15px black;
  }
}
</style>
