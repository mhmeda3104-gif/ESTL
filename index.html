<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESTL AI - ذكاء اصطناعي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0f172a; }
        .chat-container { height: calc(100vh - 160px); overflow-y: auto; display: flex; flex-col; gap: 1rem; }
        .message { padding: 1rem; border-radius: 1rem; max-width: 80%; line-height: 1.6; word-wrap: break-word; }
        .user-msg { background-color: #2563eb; align-self: flex-end; color: white; border-bottom-left-radius: 0; }
        .bot-msg { background-color: #1e293b; align-self: flex-start; border: 1px solid #334155; border-bottom-right-radius: 0; }
    </style>
</head>
<body class="text-slate-200">

    <header class="p-4 border-b border-slate-800 bg-slate-900 sticky top-0 z-10 shadow-xl">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-500">ESTL <span class="text-white">AI</span></h1>
            <span class="text-[10px] bg-green-900/30 text-green-400 px-2 py-1 rounded border border-green-800">Online</span>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 flex flex-col gap-4 chat-container" id="chat-window">
        <div class="message bot-msg">أهلاً بك! أنا ESTL AI، كيف أساعدك اليوم؟</div>
    </main>

    <footer class="fixed bottom-0 w-full bg-slate-900 p-4 border-t border-slate-800">
        <div class="max-w-4xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="اكتب رسالتك..." 
                class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-blue-500 text-white">
            <button id="send-btn" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-xl font-bold transition-all disabled:opacity-50">إرسال</button>
        </div>
    </footer>

    <script>
        // 1. ضع مفتاحك الذي يبدأ بـ AIza هنا
        const API_KEY = "AQ.Ab8RN6JxDz1qZuXvmyfXPw7hDhkJcNKBuA70f1IKydRY3VBEkg"; 
        
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        function appendMessage(text, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = isUser ? "message user-msg" : "message bot-msg";
            msgDiv.innerText = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text || sendBtn.disabled) return;

            appendMessage(text, true);
            userInput.value = '';
            sendBtn.disabled = true;

            try {
                // استخدام رابط Gemini الرسمي (v1beta)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    appendMessage(data.candidates[0].content.parts[0].text);
                } else {
                    appendMessage("حدثت مشكلة في معالجة الرد، تأكد من صلاحية المفتاح.");
                }
            } catch (error) {
                appendMessage("خطأ في الاتصال بالسيرفر. تأكد من الإنترنت أو الـ VPN.");
                console.error(error);
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
    </script>
</body>
</html>
